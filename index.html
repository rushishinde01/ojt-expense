<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Expense Tracker</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="background"></div>

    <div class="container">

        <header>

            <h1>💰 Expense Tracker</h1>

            <button id="theme-btn">
                🌙
            </button>

        </header>

        <!-- SUMMARY -->

        <section class="summary">

            <div class="card balance-card">
                <h3>Balance</h3>
                <h2 id="balance">₹0</h2>
            </div>

            <div class="card income-card">
                <h3>Income</h3>
                <h2 id="income">₹0</h2>
            </div>

            <div class="card expense-card">
                <h3>Expense</h3>
                <h2 id="expense">₹0</h2>
            </div>

            <div class="card">
                <h3>Transactions</h3>
                <h2 id="count">0</h2>
            </div>

        </section>

        <!-- FORM -->

        <form id="transaction-form">

            <input type="text" id="text" placeholder="Description" required>

            <input type="number" id="amount" placeholder="Amount (+ income, - expense)" required>

            <select id="category">

                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Salary">Salary</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Bills">Bills</option>

            </select>

            <button type="submit">
                Add Transaction
            </button>

        </form>


        <!-- SEARCH + FILTER -->

        <div class="filters">

            <input type="text" id="search" placeholder="Search transactions...">

            <select id="filter-category">

                <option value="all">All Categories</option>

                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Salary">Salary</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Bills">Bills</option>

            </select>

        </div>


        <!-- EXPORT -->

        <button id="export-btn">
            📥 Export CSV
        </button>


        <!-- TRANSACTION LIST -->

        <ul id="transaction-list">

        </ul>

    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script type="module" src="./js/main.js"></script>

</body>

</html>
